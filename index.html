<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Post Cards — Sri Vaishnavi</title>
<style>
:root {
  --bg:      #0f1117;
  --surface: #1a1d27;
  --border:  #2e3250;
  --purple:  #6c63ff;
  --teal:    #00d4aa;
  --red:     #ff6b6b;
  --yellow:  #ffd93d;
  --orange:  #ff9f43;
  --muted:   #8b92b8;
  --text:    #e8eaf6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #060810;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
}

/* ── NAV BAR ── */
.topbar {
  width: 100%;
  max-width: 680px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 20px;
}
.topbar h1 { font-size: 0.95rem; font-weight: 600; color: var(--teal); }
.topbar span { font-size: 0.78rem; color: var(--muted); }
.nav-btns { display: flex; gap: 10px; }
.nav-btn {
  background: var(--border);
  border: none;
  color: var(--text);
  padding: 7px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.82rem;
  transition: background 0.2s;
}
.nav-btn:hover { background: var(--purple); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

/* ── SLIDE COUNTER ── */
.counter {
  font-size: 0.8rem;
  color: var(--muted);
  padding: 0 12px;
  min-width: 60px;
  text-align: center;
}

/* ── CARD WRAPPER ── */
.card-wrap {
  width: 600px;
  height: 600px;
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(108,99,255,0.25), 0 0 120px rgba(0,212,170,0.08);
}

/* hide all slides, show only active */
.slide { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
.slide.active { display: block; }

/* ── SCREENSHOT HINT ── */
.hint {
  margin-top: 14px;
  font-size: 0.75rem;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  text-align: center;
}
.hint strong { color: var(--yellow); }

/* ── DOTS INDICATOR ── */
.dots {
  display: flex;
  gap: 7px;
  margin-top: 16px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 600px;
}
.dot-btn {
  width: 28px;
  height: 6px;
  border-radius: 3px;
  background: var(--border);
  border: none;
  cursor: pointer;
  transition: background 0.2s, width 0.2s;
}
.dot-btn.active { background: var(--purple); width: 36px; }

/* ── SHARED CARD BASE ── */
svg.card { width: 100%; height: 100%; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>LinkedIn Post Cards</h1>
    <span>Screenshot each card → use as LinkedIn image</span>
  </div>
  <div class="nav-btns">
    <button class="nav-btn" id="prevBtn" onclick="go(-1)" disabled>← Prev</button>
    <span class="counter" id="counter">1 / 10</span>
    <button class="nav-btn" id="nextBtn" onclick="go(1)">Next →</button>
  </div>
</div>

<div class="card-wrap" id="cardWrap">

<div class="dots" id="dots"></div>

<script>
let current = 0;
const total = 10;

// build dots
const dotsEl = document.getElementById('dots');
for (let i = 0; i < total; i++) {
  const b = document.createElement('button');
  b.className = 'dot-btn' + (i === 0 ? ' active' : '');
  b.title = 'Card ' + (i+1);
  b.onclick = () => goTo(i);
  dotsEl.appendChild(b);
}

function goTo(n) {
  document.getElementById('s' + (current + 1)).classList.remove('active');
  document.querySelectorAll('.dot-btn')[current].classList.remove('active');
  current = n;
  document.getElementById('s' + (current + 1)).classList.add('active');
  document.querySelectorAll('.dot-btn')[current].classList.add('active');
  document.getElementById('counter').textContent = (current + 1) + ' / ' + total;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === total - 1;
}

function go(dir) { goTo(Math.max(0, Math.min(total - 1, current + dir)); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});
</script>
